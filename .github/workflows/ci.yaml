name: CI

on:
  push:
    branches: [ master, "week*", code-review ]
  pull_request:
    branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install Python and dependencies
        run: |
          uv python install 3.13
          uv sync

      - name: Run Tests with Coverage
        if: ${{ false }}
        run: uv run pytest -m "not integration" --cov=src --cov-report=xml --cov-fail-under=85. # Should be >=95%
        env:
          # GIST_SECRET: ${{ secrets.GIST_SECRET }}
          # GIST_ID: ${{ secrets.GIST_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EXCHANGE_RATE_API_KEY: ${{ secrets.EXCHANGE_RATE_API_KEY }}
        # CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        # continue-on-error: false
        # run: |
          # Run tests and pipe to a file
          # the level should be 95% but that's not true yet.
          # uv run pytest --cov=src --cov-report=term-missing --cov-fail-under=85 > pytest_output.txt
          # cat pytest_output.txt

          # Improved Extraction: Look for 'TOTAL' and grab the trailing percentage digits
          # 'sed' looks for the line starting with TOTAL, captures the number before the %, and saves it.
          # echo "COVERAGE=$(grep '^TOTAL' pytest_output.txt | awk '{print $NF}' | sed 's/%//')" >> $GITHUB_ENV

      - name: Update Gist Badge
        # if: always()
        if: ${{ false }}
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ secrets.GIST_ID }}
          filename: expenses_badge.json
          label: Coverage
          # Logic: If pytest actually passed AND we have a coverage number, show it.
          # Otherwise, show 'Failing'.
          message: ${{ (steps.pytest.outcome == 'success' && env.COVERAGE != '') && format('{0}%', env.COVERAGE) || 'Failing' }}
          color: ${{ steps.pytest.outcome == 'success' && 'brightgreen' || 'red' }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Set up Python and dependencies
        run: |
          uv python install 3.13
          uv sync --all-extras --dev

      - name: check formatting
        run: uv run ruff format --check .

      - name: Check linting
        run: uv run ruff check .

      - name: Type check with Ty
        run: uv run ty check .

  docker:
    runs-on: ubuntu-latest
    needs: [test, lint]  # Only run if test and lint pass

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t expenses-api .

      - name: Verify docker compose config
        run: docker compose config

  deploy:
    runs-on: ubuntu-latest
    needs: test  # Only runs if test job passes
    # if: github.ref == 'refs/heads/main'  # Only on main branch
    if: ${{ false }} # Disable deploy for now until we have a deploy key

    steps:
    - uses: actions/checkout@v4

    - name: Deploy to Fly.io
      uses: superfly/flyctl-actions@1.4
      with:
        args: "deploy"
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}


      # - name: Update Benchmark Historypytet
      #   if: github.ref == 'refs/heads/master' # Only track history on master
      #   run: |
      #     git config --global user.name "GitHub Action"
      #     git config --global user.email "action@github.com"
      #     git add benchmark_history.jsonl
      #     git commit -m "chore: update benchmark history [skip ci]" || echo "No changes to commit"
      #     git push
